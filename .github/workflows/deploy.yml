name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch regulatory feed
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openrouter/free' }}
          REGULATIONS_API_KEY: ${{ secrets.REGULATIONS_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python3 scraper/run.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: GitHub Pages note (private repo)
        if: github.event.repository.private
        run: |
          echo "::notice title=GitHub Pages skipped::Deploy is disabled on private repos (free plan). Use Netlify, or make this repo public and enable Pages under Settings → Pages → GitHub Actions."

  deploy:
    needs: build
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
